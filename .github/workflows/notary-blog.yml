name: Auto-publish notary blog

# Runs Tuesday & Friday at 13:00 UTC (9:00 AM Eastern).
# Also runnable manually from the Actions tab (workflow_dispatch).
on:
  schedule:
    - cron: '0 13 * * 2,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write a new post with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/auto-blog.mjs

      - name: Generate blog HTML, index, routing & sitemap
        run: node scripts/gen-blog-post.mjs

      - name: Commit & push
        run: |
          git config user.name "Integrity Blog Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/blog-posts.json public/blog public/.htaccess public/sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Blog: auto-published post ($(date -u +%Y-%m-%d))"
            git push
          fi
